kind = "web"
previewPath = "/"
title = "Motor Clínico"
version = "1.0.0"
id = "artifacts/clinica-motor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20809

[services.development]
run = "pnpm --filter @workspace/clinica-motor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clinica-motor", "run", "build" ]
publicDir = "artifacts/clinica-motor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20809"
BASE_PATH = "/"
