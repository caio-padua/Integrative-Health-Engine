          type: integer
        nome:
          type: string
        descricao:
          type: string
        categoria:
          type: string
        itens:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: integer
              itemNome:
                type: string
              quantidade:
                type: string
              observacao:
                type: string
        ativo:
          type: boolean
        criadoPorId:
          type: integer
        criadoEm:
          type: string
          format: date-time
      required:
        - id
        - nome
        - ativo
        - criadoEm

    CriarProtocoloBody:
      type: object
      properties:
